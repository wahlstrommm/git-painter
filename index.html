<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Git Painter</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      max-width: 900px;
      width: 100%;
    }

    header { margin-bottom: 2rem; }
    header h1 { font-size: 1.8rem; margin-bottom: 0.5rem; }
    header p { color: #8b949e; }

    .upload-zone {
      border: 2px dashed #30363d;
      border-radius: 8px;
      padding: 3rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s;
      margin-bottom: 1.5rem;
    }
    .upload-zone:hover, .upload-zone.dragover {
      border-color: #58a6ff;
    }

    .controls, .script-settings {
      margin-bottom: 1.5rem;
    }
    .control-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
    }
    .control-row label {
      min-width: 140px;
      color: #8b949e;
    }
    .control-row input[type="range"] { flex: 1; }
    .control-row input[type="text"],
    .control-row input[type="number"] {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 4px;
      color: #c9d1d9;
      padding: 0.4rem 0.6rem;
      flex: 1;
    }
    .control-row select {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 4px;
      color: #c9d1d9;
      padding: 0.4rem 0.6rem;
    }

    .preview-section { margin-bottom: 1.5rem; }

    .graph-wrapper {
      display: flex;
      gap: 0.25rem;
      background: #0d1117;
      padding: 1rem;
      border: 1px solid #30363d;
      border-radius: 8px;
      overflow-x: auto;
    }

    .day-labels {
      display: grid;
      grid-template-rows: repeat(7, 11px);
      gap: 3px;
      font-size: 9px;
      color: #8b949e;
      padding-top: 20px;
    }
    .day-labels span {
      display: flex;
      align-items: center;
      height: 11px;
    }

    .month-labels {
      display: flex;
      font-size: 9px;
      color: #8b949e;
      height: 20px;
      align-items: flex-end;
      margin-left: 0;
    }

    .graph-grid {
      display: grid;
      grid-template-rows: repeat(7, 11px);
      grid-auto-flow: column;
      grid-auto-columns: 11px;
      gap: 3px;
    }

    .graph-cell {
      width: 11px;
      height: 11px;
      border-radius: 2px;
    }

    .graph-cell[data-level="0"], .legend-cell[data-level="0"] { background: #161b22; }
    .graph-cell[data-level="1"], .legend-cell[data-level="1"] { background: #0e4429; }
    .graph-cell[data-level="2"], .legend-cell[data-level="2"] { background: #006d32; }
    .graph-cell[data-level="3"], .legend-cell[data-level="3"] { background: #26a641; }
    .graph-cell[data-level="4"], .legend-cell[data-level="4"] { background: #39d353; }
    .graph-cell.empty { background: transparent; }

    .legend {
      display: flex;
      align-items: center;
      gap: 4px;
      justify-content: flex-end;
      margin-top: 0.5rem;
      font-size: 10px;
      color: #8b949e;
    }
    .legend-cell {
      width: 11px;
      height: 11px;
      border-radius: 2px;
      display: inline-block;
    }

    button#generateBtn {
      background: #238636;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 0.6rem 1.5rem;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 0.5rem;
    }
    button#generateBtn:hover { background: #2ea043; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Git Painter</h1>
      <p>Upload an image, paint your GitHub contribution graph.</p>
    </header>

    <section class="upload-zone" id="uploadZone">
      <p>Drag &amp; drop an image here, or click to browse</p>
      <input type="file" id="fileInput" accept="image/*" hidden>
    </section>

    <section class="controls" id="controls" style="display:none;">
      <div class="control-row">
        <label for="yearSelect">Year:</label>
        <select id="yearSelect"></select>
      </div>
      <div class="control-row">
        <label for="thresholdSlider">Threshold:</label>
        <input type="range" id="thresholdSlider" min="0" max="100" value="50">
      </div>
      <div class="control-row">
        <label for="invertToggle">Invert:</label>
        <input type="checkbox" id="invertToggle">
      </div>
    </section>

    <section class="preview-section" id="previewSection" style="display:none;">
      <div class="graph-wrapper">
        <div class="day-labels">
          <span></span><span>Mon</span><span></span><span>Wed</span><span></span><span>Fri</span><span></span>
        </div>
        <div>
          <div class="month-labels" id="monthLabels"></div>
          <div class="graph-grid" id="graphGrid"></div>
        </div>
      </div>
      <div class="legend">
        <span>Less</span>
        <span class="legend-cell" data-level="0"></span>
        <span class="legend-cell" data-level="1"></span>
        <span class="legend-cell" data-level="2"></span>
        <span class="legend-cell" data-level="3"></span>
        <span class="legend-cell" data-level="4"></span>
        <span>More</span>
      </div>
    </section>

    <section class="script-settings" id="scriptSettings" style="display:none;">
      <div class="control-row">
        <label for="repoUrl">Repo URL:</label>
        <input type="text" id="repoUrl" placeholder="https://github.com/user/repo.git">
      </div>
      <div class="control-row">
        <label for="commitIntensity">Max commits (level 4):</label>
        <input type="number" id="commitIntensity" value="20" min="4" max="100">
      </div>
      <button id="generateBtn">Download git-painter.sh</button>
    </section>
  </div>

  <canvas id="processingCanvas" hidden></canvas>

  <script>
    // -------------------------------------------------------------------------
    // Calendar grid logic
    // -------------------------------------------------------------------------

    function buildGrid(year) {
      const startDow = new Date(year, 0, 1).getDay(); // 0=Sun
      const isLeap = (year % 4 === 0 && year % 100 !== 0) || (year % 400 === 0);
      const totalDays = isLeap ? 366 : 365;
      const totalWeeks = Math.ceil((startDow + totalDays) / 7);
      const cells = [];

      for (let col = 0; col < totalWeeks; col++) {
        for (let row = 0; row < 7; row++) {
          const dayIndex = col * 7 + row - startDow;
          if (dayIndex >= 0 && dayIndex < totalDays) {
            const date = new Date(year, 0, 1 + dayIndex);
            cells.push({ date, col, row, level: 0 });
          } else {
            cells.push({ date: null, col, row, level: -1 });
          }
        }
      }
      return { cells, totalWeeks };
    }

    function getMonthLabels(year, totalWeeks) {
      const labels = [];
      const startDow = new Date(year, 0, 1).getDay();
      const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      for (let m = 0; m < 12; m++) {
        const dayOfYear = Math.round((Date.UTC(year, m, 1) - Date.UTC(year, 0, 1)) / 86400000);
        const col = Math.floor((dayOfYear + startDow) / 7);
        labels.push({ name: monthNames[m], col });
      }
      return labels;
    }

    function renderGrid(cells, totalWeeks, year) {
      const grid = document.getElementById('graphGrid');
      grid.innerHTML = '';
      grid.style.gridTemplateColumns = `repeat(${totalWeeks}, 11px)`;

      cells.forEach(cell => {
        const el = document.createElement('div');
        el.classList.add('graph-cell');
        if (cell.date === null) {
          el.classList.add('empty');
        } else {
          el.dataset.level = cell.level;
        }
        grid.appendChild(el);
      });

      const monthContainer = document.getElementById('monthLabels');
      monthContainer.innerHTML = '';
      const labels = getMonthLabels(year, totalWeeks);
      labels.forEach(label => {
        const span = document.createElement('span');
        span.textContent = label.name;
        span.style.position = 'absolute';
        span.style.left = `${label.col * 14}px`;
        monthContainer.appendChild(span);
      });
      monthContainer.style.position = 'relative';
      monthContainer.style.width = `${totalWeeks * 14}px`;
    }

    // -------------------------------------------------------------------------
    // Year selector
    // -------------------------------------------------------------------------

    function populateYearSelector() {
      const select = document.getElementById('yearSelect');
      const currentYear = new Date().getFullYear();
      for (let y = currentYear + 1; y >= 2010; y--) {
        const opt = document.createElement('option');
        opt.value = y;
        opt.textContent = y;
        if (y === currentYear) opt.selected = true;
        select.appendChild(opt);
      }
    }

    // Global state
    let currentGrid = null;
    let currentYear = new Date().getFullYear();
    let uploadedImageData = null;

    function updatePreview() {
      const { cells, totalWeeks } = buildGrid(currentYear);
      currentGrid = cells;
      renderGrid(cells, totalWeeks, currentYear);
    }

    document.getElementById('yearSelect').addEventListener('change', (e) => {
      currentYear = parseInt(e.target.value);
      if (uploadedImageData) {
        processImage();
      } else {
        updatePreview();
      }
    });

    populateYearSelector();

    // -------------------------------------------------------------------------
    // Image upload — drag-and-drop + click
    // -------------------------------------------------------------------------

    const uploadZone = document.getElementById('uploadZone');
    const fileInput = document.getElementById('fileInput');

    uploadZone.addEventListener('click', () => fileInput.click());

    uploadZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadZone.classList.add('dragover');
    });

    uploadZone.addEventListener('dragleave', () => {
      uploadZone.classList.remove('dragover');
    });

    uploadZone.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadZone.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('image/')) {
        loadImage(file);
      }
    });

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) loadImage(file);
    });

    // -------------------------------------------------------------------------
    // Image processing — crop-to-fill, grayscale, auto-contrast, quantize
    // -------------------------------------------------------------------------

    function processImage() {
      if (!uploadedImageData) return;

      const { cells, totalWeeks } = buildGrid(currentYear);
      currentGrid = cells;

      let maxCol = 0;
      cells.forEach(c => { if (c.date && c.col > maxCol) maxCol = c.col; });
      const gridW = maxCol + 1;
      const gridH = 7;

      const canvas = document.getElementById('processingCanvas');
      const ctx = canvas.getContext('2d');
      canvas.width = gridW;
      canvas.height = gridH;

      // Crop-to-fill (cover mode)
      const img = uploadedImageData;
      const imgRatio = img.width / img.height;
      const gridRatio = gridW / gridH;
      let sx, sy, sw, sh;
      if (imgRatio > gridRatio) {
        sh = img.height; sw = img.height * gridRatio;
        sx = (img.width - sw) / 2; sy = 0;
      } else {
        sw = img.width; sh = img.width / gridRatio;
        sx = 0; sy = (img.height - sh) / 2;
      }
      ctx.drawImage(img, sx, sy, sw, sh, 0, 0, gridW, gridH);

      const imageData = ctx.getImageData(0, 0, gridW, gridH);
      const pixels = imageData.data;

      // Grayscale luminance
      const luminance = [];
      for (let i = 0; i < pixels.length; i += 4) {
        luminance.push(0.299 * pixels[i] + 0.587 * pixels[i + 1] + 0.114 * pixels[i + 2]);
      }

      // Auto-contrast
      let minL = 255, maxL = 0;
      luminance.forEach(l => { if (l < minL) minL = l; if (l > maxL) maxL = l; });
      const range = maxL - minL || 1;
      const normalized = luminance.map(l => ((l - minL) / range) * 255);

      const threshold = parseInt(document.getElementById('thresholdSlider').value);
      const invert = document.getElementById('invertToggle').checked;
      const bias = threshold / 50;

      cells.forEach(cell => {
        if (cell.date === null) { cell.level = -1; return; }
        let val = normalized[cell.row * gridW + cell.col] || 0;
        if (invert) val = 255 - val;
        val = 255 * Math.pow(val / 255, bias);
        const darkness = 255 - val;
        if (darkness < 25) cell.level = 0;
        else if (darkness < 89) cell.level = 1;
        else if (darkness < 153) cell.level = 2;
        else if (darkness < 217) cell.level = 3;
        else cell.level = 4;
      });

      renderGrid(cells, totalWeeks, currentYear);
      updateCommitCount();
    }

    document.getElementById('thresholdSlider').addEventListener('input', processImage);
    document.getElementById('invertToggle').addEventListener('change', processImage);

    // -------------------------------------------------------------------------
    // Bash script generation and download
    // -------------------------------------------------------------------------

    function getCommitCount(level, maxCommits) {
      switch (level) {
        case 0: return 0;
        case 1: return 1;
        case 2: return Math.ceil(maxCommits * 0.25);
        case 3: return Math.ceil(maxCommits * 0.5);
        case 4: return maxCommits;
        default: return 0;
      }
    }

    function generateScript() {
      if (!currentGrid) return;

      const repoUrl = document.getElementById('repoUrl').value.trim();
      const maxCommits = parseInt(document.getElementById('commitIntensity').value) || 20;

      let script = `#!/bin/bash
# =============================================================================
# Git Painter -- Generated Script
# =============================================================================
#
# PREREQUISITES:
#   1. Create an EMPTY repo on GitHub first (no README, no .gitignore)
#   2. The repo must NOT be a fork
#   3. "main" must be the default branch
#   4. Requires git 2.28+ and bash
#
# USAGE:
#   chmod +x git-painter.sh
#   ./git-painter.sh
#
# =============================================================================

# Set to true to force-push (WARNING: destroys all existing commits in the repo!)
FORCE_PUSH=false

REPO_URL="${repoUrl || 'https://github.com/YOUR_USER/YOUR_REPO.git'}"

set -e

mkdir -p git-painter-art
cd git-painter-art
git init -b main

`;

      // Generate commits for each day
      currentGrid.forEach(cell => {
        if (cell.date === null || cell.level <= 0) return;
        const commits = getCommitCount(cell.level, maxCommits);
        const d = cell.date;
        const dateStr = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');

        for (let i = 0; i < commits; i++) {
          script += `echo "${dateStr} ${i}" >> canvas.txt\n`;
          script += `git add canvas.txt\n`;
          script += `GIT_AUTHOR_DATE="${dateStr}T12:00:00+0000" GIT_COMMITTER_DATE="${dateStr}T12:00:00+0000" git commit -m "paint" > /dev/null\n`;
        }
      });

      script += `
echo ""
echo "Done! Commits created."
echo ""

git remote add origin "$REPO_URL" 2>/dev/null || git remote set-url origin "$REPO_URL"

if [ "$FORCE_PUSH" = true ]; then
  echo "Force pushing to $REPO_URL ..."
  git push -u origin main --force
else
  echo "Pushing to $REPO_URL ..."
  git push -u origin main
fi

echo "Visit your GitHub profile to see the result!"
`;

      return script;
    }

    document.getElementById('generateBtn').addEventListener('click', () => {
      const script = generateScript();
      if (!script) return;

      const blob = new Blob([script], { type: 'text/x-shellscript' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'git-painter.sh';
      a.click();
      URL.revokeObjectURL(url);
    });

    function loadImage(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          uploadedImageData = img;
          uploadZone.innerHTML = `<p>&#10004; ${file.name} loaded — drag another to replace</p>`;
          document.getElementById('controls').style.display = '';
          document.getElementById('previewSection').style.display = '';
          document.getElementById('scriptSettings').style.display = '';
          processImage();
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }
  </script>
</body>
</html>
